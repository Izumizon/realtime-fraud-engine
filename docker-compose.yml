version: '3.8'

services:
  # 🐘 PostgreSQL: The Absolute Source of Truth (Ledger & Outbox)
  postgres:
    image: postgres:15-alpine
    container_name: fraud_ledger_db
    environment:
      POSTGRES_USER: revolut_user
      POSTGRES_PASSWORD: super_secret_password
      POSTGRES_DB: fraud_engine
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U revolut_user -d fraud_engine"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 🧠 Redis: The Hot Path Cache (Idempotency & Velocity)
  redis:
    image: redis:7-alpine
    container_name: fraud_hot_state
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 🏗️ Zookeeper: Required for Kafka cluster management
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: fraud_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  # 🖨️ Kafka: The Event Broker (The Conveyor Belt)
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: fraud_event_broker
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

volumes:
  pgdata:
  redisdata: