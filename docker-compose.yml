services:
  postgres:
    image: postgres:15-alpine
    container_name: fraud_ledger_db
    environment:
      POSTGRES_USER: revolut_user
      POSTGRES_PASSWORD: super_secret_password
      POSTGRES_DB: fraud_engine
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U revolut_user -d fraud_engine"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: fraud_hot_state
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: fraud_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: fraud_event_broker
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10

  db_init:
    build: .
    container_name: fraud_db_init
    command: python init_db.py
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: revolut_user
      POSTGRES_PASSWORD: super_secret_password
      POSTGRES_DB: fraud_engine

  api_gateway:
    build: .
    container_name: fraud_api_gateway
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      db_init:
        condition: service_completed_successfully
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: revolut_user
      POSTGRES_PASSWORD: super_secret_password
      POSTGRES_DB: fraud_engine

  fraud_engine:
    build: .
    container_name: fraud_engine_consumer
    command: python consumer.py
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      db_init:
        condition: service_completed_successfully
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: revolut_user
      POSTGRES_PASSWORD: super_secret_password
      POSTGRES_DB: fraud_engine
  fraud_dashboard:
    build: .
    container_name: fraud_operations_dashboard
    command: uvicorn dashboard:app --host 0.0.0.0 --port 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      db_init:
        condition: service_completed_successfully
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: revolut_user
      POSTGRES_PASSWORD: super_secret_password
      POSTGRES_DB: fraud_engine
  traffic_simulator:
    build: .
    container_name: fraud_traffic_simulator
    command: python producer.py
    depends_on:
      kafka:
        condition: service_healthy
      fraud_engine:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092

volumes:
  pgdata:
  redisdata: